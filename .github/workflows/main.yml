name: Compile DTS to DTB

on: 
  workflow_dispatch

# permissions:
#   contents: write

env:
  APT: sudo apt -y -qq -o=Dpkg::Use-Pty=0
  LINUX_AMLOGIC_ROOT: /tmp/linux-amlogic
  COMMON_DRIVERS_ROOT: /tmp/linux-amlogic/common_drivers

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install prerequisites
      run: |
        $APT update
        $APT install autoconf build-essential bc bison flex device-tree-compiler
    
    - name: Set up environment
      run: |
        cd /tmp/
        git clone --depth=1 "https://github.com/CoreELEC/linux-amlogic.git" -o "$LINUX_AMLOGIC_ROOT"
        ls -al "$LINUX_AMLOGIC_ROOT"
        du -sh "$LINUX_AMLOGIC_ROOT"
       
        cd ./linux-amlogic
        git clone --depth=1 "https://github.com/maaaaz/coreelec_common_drivers.git" -o "$COMMON_DRIVERS_ROOT"
        ls -al "$COMMON_DRIVERS_ROOT"
        du -sh "$COMMON_DRIVERS_ROOT"

    - name: Make
      run: |
        cd "$LINUX_AMLOGIC_ROOT"
        make ARCH=arm64 defconfig
    
